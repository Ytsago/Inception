services:
 nginx:
  container_name: nginx
  build:
   context: ./requirements/nginx/
  ports:
   - 443:443
  networks: 
   - Inception
  depends_on:
   mariadb:
    condition: service_healthy
   wordpress:
    condition: service_healthy
  restart: always
  volumes:
   - volume-web:/var/www/html/

 mariadb:
  container_name: mariadb
  build:
   context: ./requirements/mariadb/
  networks: 
   - Inception
  healthcheck:
   test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
   interval: 10s
   timeout: 10s
   retries: 5
  restart: always
  environment:
   DB_NAME: ${DB_NAME} 
   DB_USER: ${DB_USER}
   DB_PASS: ${DB_PASS}
  volumes:
   - volume-db:/var/lib/mysql

 # depends_on mariadb kept for the eval but may be removed (Only nginx need to wait for both wordpress and mariadb)
 wordpress:
  container_name: wordpress
  build:
   context: ./requirements/wordpress/
  networks:
   - Inception
  depends_on:
   mariadb:
    condition: service_healthy
  healthcheck:
   test: ["CMD-SHELL", "nc -z localhost 9000"]
   interval: 10s
   timeout: 5s
   retries: 5
  restart: always
  volumes:
   - volume-web:/var/www/html/
  environment:
   DB_NAME: ${DB_NAME} 
   DB_USER: ${DB_USER}
   DB_PASS: ${DB_PASS}
   DB_HOST: ${DB_HOST}
   WP_ADMIN: ${WP_ADMIN}
   WP_ADMIN_PASS: ${WP_ADMIN_PASS}
   WP_ADMIN_MAIL: ${WP_ADMIN_MAIL}
   WP_USER: ${WP_USER}
   WP_USER_PASS: ${WP_USER_PASS}
   WP_USER_MAIL: ${WP_USER_MAIL}
   WP_USER_ROLE: ${WP_USER_ROLE}
   WP_URL: ${WP_URL}
   WP_TITLE: ${WP_TITLE}

networks:
 Inception:
  driver: bridge
 
volumes:
 volume-db:
  driver: local
  driver_opts:
   type: none
   o: bind
   device: /home/secros/data/db
 volume-web:
  driver: local
  driver_opts:
   type: none
   o: bind
   device: /home/secros/data/web
